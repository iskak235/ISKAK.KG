{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Iskak Site</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'index' %}">ISKAK.KG</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto text-center">
                <li class="nav-item"><a class="nav-link px-3" href="{% url 'category_page' 'STUDY' %}">Окуум</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="{% url 'category_page' 'WORK' %}">Ишим</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="{% url 'category_page' 'GAMES' %}">Оюндар</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="{% url 'category_page' 'VILLAGE' %}">Эс алуу</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="hero-section shadow-sm">
    <div class="container text-center">
        <h1 class="display-4 fw-bold">{{ title }}</h1>
        <p class="opacity-75">Менин жашоомдун санарип архиви</p>
    </div>
</div>

<div class="container">
    <div class="row g-4"> {% for item in items %}
        <div class="col-12 col-md-6 col-lg-4">
            <a href="{% url 'detail_page' item.pk %}" class="text-decoration-none text-dark">
                <div class="card h-100 position-relative border-0 shadow-sm">
                    <span class="badge-category">{{ item.get_category_display }}</span>
                    <img src="{{ item.image.url }}" class="card-img-top" style="height: 250px; object-fit: cover; border-radius: 15px 15px 0 0;">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ item.title }}</h5>
                        <p class="card-text text-muted small">{{ item.description|truncatewords:12 }}</p>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'main/js/script.js' %}"></script>
</body>
</html>
