{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
</head>
<body>
    <div class="container py-5">
        <a href="{% url 'index' %}" class="btn btn-outline-secondary mb-4">← Артка кайтуу</a>
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <img src="{{ item.image.url }}" class="img-fluid rounded-4 shadow mb-4" style="width: 100%;">
                <h1 class="fw-bold">{{ item.title }}</h1>
                <span class="badge bg-primary mb-3">{{ item.get_category_display }}</span>
                <p class="text-muted small">Кошулган күнү: {{ item.date_added|date:"d.m.Y" }}</p>
                <hr>
                <p style="font-size: 1.2rem; line-height: 1.8;">{{ item.description }}</p>
            </div>
        </div>
    </div>
</body>
</html>
